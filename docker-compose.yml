# Docker Compose configuration for the PixelCanvas distributed system
services:
  # PostgreSQL database for persistent storage of user accounts and canvas state
  db:
    image: postgres:18
    # Increased connections and memory buffers to handle high-concurrency pixel writes
    command: [ "postgres", "-c", "max_connections=3000", "-c", "shared_buffers=512MB" ]
    volumes:
      - ./init-db:/docker-entrypoint-initdb.d # Seed the database with initial schema
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for real-time pub/sub synchronization between backend instances
  redis:
    image: redis:8.6
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # Primary C++ backend instance
  backend1:
    build:
      context: .
      dockerfile: ./Dockerfile.backend
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - DB_USER=${POSTGRES_USER}
      - DB_PASS=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - DB_HOST=${DB_HOST}
      - REDIS_HOST=redis # Connects to the redis service by its network alias
    ulimits:
      nofile:
        soft: 30000
        hard: 30000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  # Secondary C++ backend instance for high availability and load balancing
  backend2:
    build:
      context: .
      dockerfile: ./Dockerfile.backend
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - DB_USER=${POSTGRES_USER}
      - DB_PASS=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - DB_HOST=${DB_HOST}
      - REDIS_HOST=redis # Ensures both instances point to the same message broker
    ulimits:
      nofile:
        soft: 30000
        hard: 30000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  # Nginx reverse proxy and load balancer to distribute traffic across backends
  nginx:
    image: nginx:1.28.2-alpine
    ports:
      - "8080:80"
    ulimits:
      nofile:
        soft: 30000
        hard: 30000
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro # Mount custom Nginx config
      - ./static:/usr/share/nginx/html:ro # Serve static frontend assets
    depends_on:
      - backend1
      - backend2

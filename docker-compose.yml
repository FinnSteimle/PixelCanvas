services:
  db:
    image: postgres:15
    volumes:
      - ./init-db:/docker-entrypoint-initdb.d
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pixelcanvas
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  # Your backend will eventually be added here for the final demo
  # For now, it's just infrastructure for your Dev Container
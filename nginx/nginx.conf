worker_rlimit_nofile 30000; # Tells Nginx it's allowed to open many files

# Nginx configuration for PixelCanvas: Reverse Proxy and Load Balancer
events {
    # Maximum number of simultaneous connections per worker
    worker_connections 10000;
}

http {
    # Basic performance tuning for high-speed C++ backends
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Logging configuration
    access_log /var/log/nginx/access.log;
    
    # Required for rendering CSS correctly
    include /etc/nginx/mime.types;

    # The Load Balancer (Least Connections)
    upstream backend_servers {
        least_conn;
        server backend1:8080 max_fails=0 fail_timeout=2s;
        server backend2:8080 max_fails=0 fail_timeout=2s;

        # Keep 200 connections open per backend to reduce TCP handshake overhead
        keepalive 200;
    }

    server {
        # Listen on standard HTTP port inside the container
        listen 80;

        # Global proxy settings to support upstream keepalive and host identification
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;

        # INCREASED TIMEOUTS: Essential for "Pure" Argon2 loads
        proxy_connect_timeout 10s; 
        proxy_read_timeout 10s;
        proxy_send_timeout 10s;
        
        proxy_next_upstream error timeout invalid_header http_500;

        # Route Standard HTTP Traffic (HTML, JS, CSS)
        # Serves static assets directly from the mounted volume
        location / {
            root /usr/share/nginx/html;
            index index.html;
        }

        # Route API Auth/Data Traffic to C++ Backends
        location /login {
            proxy_pass http://backend_servers;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        location /register {
            proxy_pass http://backend_servers;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        location /canvas {
            proxy_pass http://backend_servers;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Route WebSocket Traffic for real-time pixel updates
        location /ws {
            proxy_pass http://backend_servers;
            
            # Upgrade the connection from HTTP to WebSocket protocol
            # Connection "" is overridden here to allow the upgrade handshake
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            
            proxy_set_header X-Real-IP $remote_addr;
            
            # High timeouts to prevent premature closing of idle user connections
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}